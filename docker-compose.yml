# docker-compose.yml — Phase 0 bootstrap
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ecom_support
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports: ["9200:9200"]
    volumes:
      - esdata:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  modernbert:
    build: ./services/modernbert_bento
    env_file: .env
    environment:
      MODERNBERT_MODEL_DIR: /models/modernbert_finetuned
    volumes:
      - ./training/models/modernbert finedtuned:/models/modernbert_finetuned:ro

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      CLASSIFIER_BENTOML_URL: http://modernbert:3000/classify
    depends_on: [postgres, elasticsearch, redis, modernbert]
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts
      - ./data:/app/data

  frontend:
    build: ./frontend
    ports: ["8501:8501"]
    env_file: .env
    depends_on: [backend]

  prometheus:
    image: prom/prometheus
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml

  grafana:
    image: grafana/grafana
    ports: ["3000:3000"]
    depends_on: [prometheus]

  alertmanager:
    image: prom/alertmanager
    ports: ["9093:9093"]
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml

volumes:
  pgdata:
  esdata:
