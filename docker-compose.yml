# docker-compose.yml — Phase 0 bootstrap
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ecom_support
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: ["ollama_models:/root/.ollama"]
    # Uncomment for GPU: deploy: { resources: { reservations: { devices: [{ capabilities: [gpu] }] } } }

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [postgres, redis, ollama]
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts

  frontend:
    build: ./frontend
    ports: ["8501:8501"]
    env_file: .env
    depends_on: [backend]

  prometheus:
    image: prom/prometheus
    ports: ["9090:9090"]
    volumes: ["./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"]

  grafana:
    image: grafana/grafana
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  pgdata:
  ollama_models:
